name: followbrief

services:
  postgres:
    image: postgres:16-alpine
    container_name: followbrief-postgres
    environment:
      POSTGRES_USER: followbrief
      POSTGRES_PASSWORD: followbrief
      POSTGRES_DB: followbrief
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - followbrief-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U followbrief -d followbrief"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: followbrief-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  followbrief-postgres-data:
